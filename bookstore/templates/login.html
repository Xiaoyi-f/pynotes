{% extends "base_header.html" %}
{% block title %}客户登录{% endblock %}
{% block body %}
<!-- 显示登录错误信息 -->
<ul>
    {% for field, errors in form.errors.items() %}
    {% for message in errors %}
    <li class="error">{{ message }}</li>
    {% endfor %}
    {% endfor %}
</ul>
<form action = "/login" method = "post">
    <input type = "hidden" name = "csrf_token" value = "{{ csrf_token() }}" />
    <table width = "100%" align = "center">
    <tr height = "40">
    <td colspan = "2" align = "center"><strong>请您登录</strong></td>
    <tr height = "40">
    <td width = "50%" align = "right"><img src = "{{ url_for('static', filename = 'images/3.jpg') }}" align = "absmiddle"/>&nbsp;&nbsp;客户账号：
    </td>
    <td>{{ form.userid }}</td>
    <tr height = "40">
    <td width = "50%" align = "right"><img src = "{{ url_for('static', filename = 'images/2.jpg') }}" align = "absmiddle"/>&nbsp;&nbsp;客户密码：
    </td>
    <td>{{ form.password }}</td>
    <tr height = "40">
    <td align = "right">&nbsp;</td>
    <td><input type = "image" src = "{{ url_for('static', filename = 'images/login_button.jpg') }}" onclick = "document.forms[0].fn.value = 'login'"/>
    &nbsp;&nbsp;&nbsp;&nbsp;<a href = "/reg"><img src = "{{ url_for('static', filename = 'images/reg_button.jpg') }}" border = "0"></a></td>
    </tr>
</table>
</form>
{% endblock %}
