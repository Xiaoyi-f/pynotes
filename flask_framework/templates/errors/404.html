{% extends "base.html" %}

{% block title %}页面未找到 - 404{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body">
                <h1 class="display-1 text-warning">404</h1>
                <h2>页面未找到</h2>
                <p class="lead">抱歉，您访问的页面不存在。</p>
                <hr>
                <p>可能的原因：</p>
                <ul class="text-start">
                    <li>页面已被删除</li>
                    <li>URL地址输入错误</li>
                    <li>链接已失效</li>
                </ul>
                <div class="mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-primary">返回首页</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
