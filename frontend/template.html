  <title>HTML</title>
  <style>
    * {
      padding: 0;
      border: 0;
      margin: 0;
      box-sizing: border-box;
    }
  </style>

<body>
  <header>
    <video src="title.mp4" style="pointer-events: none;" muted autoplay loop></video>
    <h1>标题</h1>
    <nav>导航栏</nav>
  </header>

  <div class="main">
    <main>
      <h1>一级标题</h1>
      <article>
        <h2>二级标题</h2>

        <section>
          <h3>第一节</h3>
          <p>普通段落，包含<strong>强调</strong>、<ins>下划线</ins>、<em>斜体</em>、<del>删除线</del></p>
          <span>行内标签</span>
        </section>

        <section>
          <h3>第二节</h3>
          <a href="xxx"></a>
          <img src="tuotuo.png" alt="demo" loading="lazy">
        </section>

        <section>
          <h3>第三节</h3>
          <ul>
            <li>无序列表项</li>
          </ul>
          <ol>
            <li>有序列表项</li>
          </ol>
          <dl>
            <dt>定义列表项</dt>
            <dd>定义列表描述</dd>
          </dl>
        </section>
      </article>

      <section>
        <h2>表格数据</h2>
        <table>
          <caption>表格标题</caption>
          <thead>
            <tr>
              <th>表头</th>
              <th>表头</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>表体</td>
              <td>表体</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td>表尾</td>
              <td>表尾</td>
            </tr>
          </tfoot>
        </table>
      </section>

      <section>
        <h2>表单区域</h2>
        <form action="/submit" method="post">
          <label for="name">姓名:</label> <!-- for指向的是id, name和 value 是一对的 -->
          <input type="text" id="name" name="name" placeolder="请输入" required>

          <label for="age">年龄:</label>
          <input type="number" id="age" name="age" min="0" max="150">

          <label for="city">城市:</label>
          <select name="city" id="city">
            <option value="" hidden>请选择</option>
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
          </select>

          <br>
          <label for="bio">简介:</label>
          <br>
          <textarea name="bio" id="bio" rows="4" maxlength="200" disabled style="resize: none;"></textarea>
          <hr>

          <label>
            <input type="checkbox" name="agree" required> 同意协议
          </label>
          <label>
            <input type="checkbox" name="agree" required> 同意跟随
          </label>

          <br>

          <label>
            <input type="radio" name="sex" id="male"> 男
          </label>
          <label>
            <input type="radio" name="sex" id="female"> 女
          </label>

          <button type="reset">重置</button>
          <button type="submit">提交</button>
        </form>
      </section>

      <section>
        <h2>媒体文件</h2>

        <figure>
          <img src="tuotuomiao.png" alt="picture">
          <figcaption>图片说明</figcaption>
        </figure>

        <video controls muted loop autoplay>
          <source src="xx" type="xx">
          <source src="xx" type="xx">
        </video>

        <audio controls muted loop>
          <source src="xx" type="xx">
          <source src="xx" type="xx">
        </audio>
      </section>
    </main>

    <aside>
      <h3>侧边栏</h3>

      <section>
        <h4>相关文章</h4>
        <ul>
          <li><a href="javascript:">超链接</a></li>
          <li><a href="#">超链接</a></li>
        </ul>
      </section>

      <section>
        <h4>广告位</h4>
        <p>这里可以放广告或推送内容</p>
      </section>
    </aside>
  </div>

  <footer>
    <p>&copy; 2026 作者 Xiaoyi-f --NieJianbing 版权所有，禁止任何形式未经授权转载</p>

      <a href="xxx">xxx</a>
    </nav>
  </footer>

</body>

</html>
