<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="The base of HTML.">
  <meta name="keywords" content="HTML">
  <meta name="author" content="XiaoYi">
  <meta name="copyright" content="Copyright 2026 XiaoYi. All rights reserved.">
  <meta name="og:title" content="The base of HTML.">
  <meta name="og:description" content="The base of HTML.">
  <link rel="stylesheet" href="./template.css" media="">
  <link rel="icon" href="favicon.ico">
  <link rel="prev" href="prev.html">
  <link rel="next" href="next.html">
  <title>The base of HTML.</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      border: 0;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <header>
    <h1>标题</h1>
    <!-- 导航栏 -->
    <nav>
    </nav>
  </header>

  <div>
    <main>
      <!-- 标题系列 -->
      <h1>一级标题（页面唯一）</h1>

      <!-- 文章区块 -->
      <article>
        <h2>文章标题</h2>

        <!-- 文章内的分段 -->
        <section>
          <h3>第一节</h3>
          <p>普通段落，包含<strong>强调</strong>和<em>斜体</em></p>
          <span>行内标签</span>
        </section>

        <section>
          <h3>第二节</h3>
          <!-- 链接和图片 -->
          <a href="https://example.com" target="_blank">外部链接</a>
          <img src="image.jpg" alt="图片描述" loading="lazy">
        </section>

        <section>
          <h3>第三节：列表</h3>
          <!-- 列表 -->
          <ul>
            <li>无序列表项</li>
          </ul>
          <ol>
            <li>有序列表项</li>
          </ol>
          <dl>
            <dt>定义列表项</dt>
            <dd>定义列表项的描述</dd>
          </dl>
        </section>
      </article>

      <!-- 表格区块 -->
      <section>
        <h2>数据表格</h2>
        <table>
          <caption>表格标题</caption>
          <thead>
            <tr>
              <th>表头</th>
              <th>表头</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>数据</td>
              <td>数据</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td>表尾</td>
              <td>表尾</td>
            </tr>
          </tfoot>
        </table>
      </section>

      <!-- 表单区块 -->
      <section>
        <h2>用户表单</h2>
        <form action="/submit" method="post">
          <!-- 输入框 -->
          <label for="name">姓名：</label>
          <input type="text" id="name" name="name" placeholder="请输入" required>

          <!-- 数字输入 -->
          <label for="age">年龄：</label>
          <input type="number" id="age" name="age" min="0" max="150">

          <!-- 下拉选择 -->
          <label for="city">城市：</label>
          <select id="city" name="city">
            <option value="">请选择</option>
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
          </select>

          <!-- 多行文本 -->
          <label for="bio">简介：</label>
          <textarea id="bio" name="bio" rows="4" maxlength="200"></textarea>

          <!-- 复选框/单选框 -->
          <label>
            <input type="checkbox" name="agree" required> 同意协议
          </label>

          <!-- 按钮 -->
          <button type="reset">重置</button>
          <button type="submit">提交</button>
        </form>
      </section>

      <section>
      <!-- 媒体区块 -->
      <h2>媒体文件</h2>
      <figure>
        <img src="photo.jpg" alt="照片">
        <figcaption>图片说明</figcaption>
      </figure>

      <video controls loop muted autoplay>
        <source src="xxx" type="xxx">
      </video>
      <audio controls loop muted>
        <source src="xxx" type="xxx">
      </audio>
      </section>
    </main>

    <aside>
      <h3>侧边栏</h3>

      <!-- 侧边栏内的独立区块 -->
      <section>
        <h4>相关文章</h4>
        <ul>
          <li><a href="#">推荐文章</a></li>
        </ul>
      </section>

      <section>
        <h4>广告位</h4>
        <p>这里可以放广告或推广内容</p>
      </section>
    </aside>
  </div>

  <footer>
    <p>&copy; 2026 作者 XiaoYi --NieJianbing 版权所有, 禁止任何形式的未经授权转载</p>
    <!-- 2026整年版权所有 -->
    <!-- 底部导航 -->
    <nav>
      <a href="/privacy">隐私政策</a> |
      <a href="/terms">使用条款</a> |
      <a href="/sitemap">网站地图</a>
    </nav>
  </footer>

  <!-- 脚本放在最后 -->
  <script src="script.js"></script>
</body>

</html>
