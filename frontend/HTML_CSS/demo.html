    body {
      font-family: 'Noto Serif SC', serif, 'Segoe UI', sans-serif;
      /* 优先使用思源宋体 */
    }
  </style>

<body>
  <header>
    <div id="slide">
      <div class="container">
        <video src="title.mp4" muted autoplay loop style="pointer-events: none;"></video>
      </div>
      <div class="container">
        <video src="back.mp4" muted autoplay loop style="pointer-events: none;"></video>
      </div>
    </div>
    <h1>标题</h1>
    <nav>导航栏</nav>
  </header>

  <div class="main">
    <main>
      <h1>一级标题</h1>

      <article>
        <h2>二级标题</h2>
        <section>
          <h3>第一节</h3>
          <p>普通段落，包含<strong>强调</strong>、<ins>下划线</ins>、<em>斜体</em>、<del>删除线</del></p>
          <span>行内标签</span>
        </section>

        <section>
          <h3>第二节</h3>
          <img src="tuotuo.png" alt="The ear of TuoTuoCat">
        </section>

        <section>
          <h3>第三节</h3>
          <ul>
            <li>无序列表项</li>
          </ul>
          <ol>
            <li>有序列表项</li>
          </ol>
          <dl>
            <dt>定义列表项</dt>
            <dd>&emsp;定义列表描述</dd>
          </dl>
        </section>
      </article>
      <section>
        <h2>表格数据</h2>
        <table>
          <caption>表格标题</caption>
          <thead>
            <tr>
              <th>表头</th>
              <th>表头</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>表体</td>
              <td>表体</td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td>表尾</td>
              <td>表尾</td>
            </tr>
          </tfoot>
        </table>
      </section>
      <section>
        <form action="/submit" method="post">
          <label for="name">姓名:</label><br>
          <input type="text" id="name" name="name" placeholder="请输入姓名" required>

          <br><br>

          <label for="age">年龄:</label><br>
          <input type="number" id="age" name="age" min="0" max="150" placeholder="age" required>

          <br><br>

          <label for="phone">电话号码:</label><br>
          <input type="tel" id="phone" name="phone" placeholder="请输入电话号码" required>

          <br><br>

          <label for="email">邮箱:</label><br>
          <input type="email" id="eamil" name="email" placeholder="请输入邮箱" required>

          <br><br>

          <label for="city">城市:</label><br>
          <select name="city" id="city">
            <option value="" hidden>请选择</option>
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
          </select>

          <br><br>

          <label for="bio">简介:</label>

          <br>

          <textarea name="bio" id="bio" rows="4" maxlength="200" style="resize: none;"></textarea>

          <hr>

          <label>
            <input type="checkbox" name="agree" required> 同意协议
          </label>
          <label>
            <input type="checkbox" name="agree" required> 同意跟随
          </label>

          <br>

          <label>
            <input type="radio" name="sex" id="male"> 男
          </label>
          <label>
            <input type="radio" name="sex" id="female"> 女
          </label>
        </form>

        <form action="/submit" method="post" enctype="multipart/form-data">
          <label>
            <input type="file" name="file" multiple>
          </label>
        </form>

        <button type="reset">重置</button>
        <button type="submit">提交</button>
      </section>

      <section>
        <h2>媒体文件</h2>
        <figure>
          <img src="tuotuomiao.png" alt="TuoTuoMiao">
          <figcaption>图片说明</figcaption>
        </figure>
        <div id="media">
          <video muted autoplay loop controls>
            <source src="title.mp4" type="video/mp4">
          </video>
          <audio loop controls>
            <source src="wind.mp3" type="audio/mpeg">
          </audio>
        </div>
      </section>
    </main>
    <div class="aside">
      <aside>
        <h2>侧边栏</h2>
        <section>
          <h2>相关文章</h2>
          <ul>
            <li><a href="#">●&nbsp;超链接</a></li>
            <li><a href="#">●&nbsp;超链接</a></li>
          </ul>
        </section>
        <section>
          <h2>广告位</h2>
          <p>这里可以放广告或推送内容</p>
        </section>
      </aside>
      <section class="extends">
        <h2>友情链接</h2>
        <ul>
          <li><a href="#">●&nbsp;超链接</a></li>
          <li><a href="#">●&nbsp;超链接</a></li>
        </ul>
        <h3>官方QQ群</h3>
        <ul>
          <li>xxx</li>
        </ul>
      </section>
    </div>
  </div>

</body>

</html>
