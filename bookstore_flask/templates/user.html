{% extends "base_title.html" %}
{% block title %}账户信息{% endblock %}
{% block body %}
<style type="text/css">
    table {
        border-collapse: collapse;
    }

    .boder {
        border: 1px solid #5B96D0;
    }

    .col1 {
        background-color: #A6D2FF;
        text-align: right;
        padding-right: 10px;
        border: 1px solid #5B96D0;
        line-height: 50px;
    }

    .col2 {
        padding-left: 10px;
        border: 1px solid #5B96D0;
        line-height: 50px;
    }

    .textfield {
        height: 20px;
        width: 200px;
        border: 1px solid #999999;
        text-align: left;
        font-size: medium;
        line-height: 50px;
    }
</style>
<table width="100%" border="0" align="center">
    <tr>
        <td width="616"><img src="{{ url_for('static', filename='images/user.jpg') }}" align="absmiddle" /></td>
        {% include 'goods_header.html' %}
    </tr>
</table>
<hr width="100%" />
<div class="text3" align="center">账户信息</div>
<br>
<form action="/reg" method="POST">
    <table width="60%" border="0" align="center" class="boder">
        <tr>
            <td width="35%" height="27" class="col1">客户账号：</td>
            <td class="col2">{{ user.id }}</td>
        </tr>
        <tr>
            <td height="27" class="col1">客户姓名：</td>
            <td class="col2">{{ user.name }}</td>
        </tr>
        <tr>
            <td height="27" class="col1">出生日期：</td>
            <td class="col2">{{ user.birthday }}</td>
        </tr>
        <tr>
            <td height="27" class="col1">通信地址：</td>
            <td class="col2">{{ user.address }}</td>
        </tr>
        <tr>
            <td height="27" class="col1">电话号码：</td>
            <td class="col2">{{ user.phone }}</td>
        </tr>
    </table>
    <br>
</form>
{% endblock %}
